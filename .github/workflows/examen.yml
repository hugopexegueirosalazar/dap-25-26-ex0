name: Examen - Build & Push MySQL

on:
  workflow_dispatch:

env:
  IMAGE_NAME: hugopexegueirosalazar/dap-25-26-ex0-mysql:latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Paso 1: Obtener el código (checkout)
      - name: Checkout
        uses: actions/checkout@v4

      # Paso 2: Login Docker Hub (con secrets)
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Paso 3: Construir imagen (Dockerfile)
      - name: Build image
        run: docker build -t $IMAGE_NAME .

      # Paso 4: Empujar a Docker Hub
      - name: Push image
        run: docker push $IMAGE_NAME
